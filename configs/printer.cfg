# Config for Voron 350
# Hardware:
# Raspi, Octopus Pro, CAN-Board
# 
# Sources:
# https://github.com/bigtreetech/BIGTREETECH-OCTOPUS-V1.0/blob/master/Firmware/Klipper/generic-bigtreetech-octopus-pro-v1.1.cfg
# https://github.com/bigtreetech/EBB/blob/master/EBB%20SB2240_2209%20CAN/sample-bigtreetech-ebb-sb-canbus-v1.0.cfg

[include fluidd.cfg]
[include macros.cfg]
[include KAMP_Settings.cfg]

[virtual_sdcard]
path: /home/voron/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[exclude_object]

[mcu]
canbus_uuid: 6282bbf2fe7f

[mcu EBBCan]
canbus_uuid: 53e9bdd0d69f

# [mcu eddy_probe]
# canbus_uuid: aa09ed458bf3

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 50
max_z_accel: 350
square_corner_velocity: 5.0

#####################################################################
#   X/Y Stepper Settings
#####################################################################

[force_move]
enable_force_move: True # Necessary for eddy calibration

# Octopus Pro Stepper Pins:
# 
# Driver EN    STEP  DIR   CS
# 0      PF14  PF13  PF12  PC4
# 1      PF15  PG0   PG1   PD11
# 2      PG5   PF11  PG3   PC6
# 3      PA0   PG4   PC1   PC7
# 4      PG2   PF9   PF10  PF2
# 5      PF1   PC13  PF0   PE4
# 6      PD4   PE2   PE3   PE1
# 7      PE0   PE6   PA14  PD3


# MOTOR0 - B-Motor
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200
endstop_pin: EBBCan: PB6
position_min: 0
position_endstop: 320
position_max: 320
homing_speed: 25 
homing_retract_dist: 5
homing_positive_dir: true
[tmc2209 stepper_x]
uart_pin: PC4
interpolate: True
run_current: 0.5
sense_resistor: 0.110

# MOTOR1 - A-Motor
[stepper_y]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200
endstop_pin: EBBCan: PB5
position_min: 0
position_endstop: 330
position_max: 330
homing_speed: 50
homing_retract_dist: 5
homing_positive_dir: true
[tmc2209 stepper_y]
uart_pin: PD11
interpolate: True
run_current: 0.5
sense_resistor: 0.110

#####################################################################
#   Z Stepper Settings
#####################################################################

# MOTOR2_1 - Z0 - Driver 2 - Front Left
[stepper_z]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
# endstop_pin: PG6 # Original Voron Z-Endstop
endstop_pin: probe:z_virtual_endstop
position_max: 340
position_min: -10
#position_endstop: 4.297
homing_speed: 8
homing_retract_speed: 2
second_homing_speed: 3
homing_retract_dist: 0.4
[tmc2209 stepper_z]
uart_pin: PC6
interpolate: true
run_current: 0.5
sense_resistor: 0.110

# MOTOR3 - Z1 - Driver 3 - Rear Left
# Changed to Driver6
[stepper_z1]
step_pin: PE2
dir_pin: PE3
enable_pin: !PD4
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
[tmc2209 stepper_z1]
uart_pin: PE1
interpolate: true
run_current: 0.5
sense_resistor: 0.110

# MOTOR4 - Z2 - Driver 4 - Rear Right
[stepper_z2]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: true
run_current: 0.5
sense_resistor: 0.110

# MOTOR5 - Z3 - Driver 5 - Front Right
[stepper_z3]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: true
run_current: 0.5
sense_resistor: 0.110

#####################################################################
# 	Homing and Gantry
#####################################################################

[safe_z_home]
#	XY Location of the Z Endstop Switch
# home_xy_position: 199,329
# Tap: Center of the bed
home_xy_position: 160,160
z_hop: 10
z_hop_speed: 25
speed: 200

[quad_gantry_level]
speed: 150
gantry_corners:
  -60,-10
  410,420
#  Probe points
points:
  50,25
  50,275
  300,275
  300,25

#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 16
rotation_distance: 3.52
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan: PB13
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBBCan: PA3
control: pid
pid_kp: 16.047
pid_ki: 0.891
pid_kd: 72.216
min_temp: -255
max_temp: 270
min_extrude_temp: 180
max_extrude_cross_section: 5 # High value required for KAMP adaptive purging
[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.650
stealthchop_threshold: 999999

#####################################################################
#   Bed Heater
#####################################################################
[heater_bed]
heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF3
max_power: 0.6
min_temp: 0
max_temp: 120
control: pid
pid_kp: 30.696
pid_ki: 0.723
pid_kd: 325.762

#####################################################################
#   Bed Mesh
#####################################################################
[bed_mesh]
# speed: 300
speed: 200
horizontal_move_z: 10
mesh_min: 40, 40
mesh_max: 310,280
zero_reference_position: 175,175 #for use with stock z endstop
fade_start: 0.6
fade_end: 10.0
probe_count: 9,9 # Values should be odd, so one point is directly at bed center
algorithm: bicubic

#####################################################################
#   Probe (Voron Tap)
#####################################################################
[probe]
pin: ~!EBBCan: PB9
x_offset: 0 
y_offset: 0
z_offset: 0 
speed: 5.0
samples: 2
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.05
samples_tolerance_retries: 3

activate_gcode:
    {% set PROBE_TEMP = 150 %}
    {% set MAX_TEMP = PROBE_TEMP + 5 %}
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    {% set TARGET_TEMP = printer.extruder.target %}

    {% if TARGET_TEMP > PROBE_TEMP %}
        { action_respond_info('Extruder temperature target of %.1fC is too high, lowering to %.1fC' % (TARGET_TEMP, PROBE_TEMP)) }
        M109 S{ PROBE_TEMP }
    {% else %}
        # Temperature target is already low enough, but nozzle may still be too hot.
        {% if ACTUAL_TEMP > MAX_TEMP %}
            { action_respond_info('Extruder temperature %.1fC is still too high, waiting until below %.1fC' % (ACTUAL_TEMP, MAX_TEMP)) }
            TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={ MAX_TEMP }
        {% endif %}
    {% endif %}
    

