#####################################################################
#   Fan Control
#####################################################################

# Stealthburner Top/Part Fan
[fan]
pin: EBBCan: PA1

# Stealthburner Bottom/Extruder Fan
[heater_fan hotend_fan]
pin: EBBCan: PA0
heater: extruder
heater_temp: 50.0

# E-Case Fan 1
[controller_fan CaseFan1]
pin: PA8
fan_speed: 0.75
idle_speed: 0.5
idle_timeout: 300
shutdown_speed: 1.0

# E-Case Fan 2
[controller_fan CaseFan2]
pin: PE5
fan_speed: 0.75
idle_speed: 0.5
idle_timeout: 300
shutdown_speed: 1.0

# Filter Fan
[fan_generic exhaust_fan]
pin: PD12
max_power: 1.0
shutdown_speed: 1.0


#####################################################################
#   LED Control
#####################################################################
[neopixel hotend_rgb]
pin: EBBCan:PD3
chain_count:3
initial_RED: 0.1
initial_GREEN: 0.1
initial_BLUE: 0.1

[neopixel case_rgb]
pin: PB10
chain_count:24
initial_RED: 0.1
initial_GREEN: 0.1
initial_BLUE: 0.1

#####################################################################
# Other sensors
#####################################################################
[temperature_sensor Raspberry]
sensor_type: temperature_host

[temperature_sensor EBB_NTC]
sensor_type: Generic 3950
sensor_pin: EBBCan: PA2

[temperature_sensor Case]
sensor_type: Generic 3950
sensor_pin: PF4

[filament_switch_sensor fila_sensor]
pause_on_runout: True
switch_pin: !PG12

#####################################################################
# Acceleration sensor
#####################################################################

[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: z,-y,x

[resonance_tester]
probe_points: 100, 100, 20
accel_chip: adxl345

########################################
# EXP1 / EXP2 (display) pins
########################################
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE8, EXP1_2=PE7,
    EXP1_3=PE9, EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,    # Slot in the socket on this side
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PB1, EXP2_4=PA4,
    EXP2_5=PB2, EXP2_6=PA7,      # Slot in the socket on this side
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<5V>
    
#####################################################################
#   Displays
#####################################################################
[display]
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2
contrast: 63
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
spi_software_sclk_pin: PA5

# [output_pin beeper]
# pin: EXP1_1

[neopixel btt_mini12864]
pin: EXP1_6
chain_count: 3
color_order: RGB
initial_RED: 0.4
initial_GREEN: 0.4
initial_BLUE: 0.4

