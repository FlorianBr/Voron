#####################################################################
#   Macros
# Sources:
# Source: https://github.com/jontek2/A-better-print_start-macro
# https://docs.vorondesign.com/community/macros/macros/120decibell.html
#####################################################################

# Auto-Shutdown
[delayed_gcode POWER_OFF_PRINTER_CHECK]
gcode:
  RESPOND PREFIX="info" MSG="Check for Auto-Off ..."
  {% if printer.idle_timeout.state == "Idle" or printer.idle_timeout.state == "Ready" %}
    {% if printer.extruder.temperature < 50.0 and printer.heater_bed.temperature < 65.0 %}
      {% if printer.extruder.target == 0.0 and printer.heater_bed.target == 0.0 %}
        UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=0
        RESPOND PREFIX="info" MSG="Auto-Off!"
        UPDATE_DELAYED_GCODE ID=POWER_OFF_PI DURATION=30
      {% else %}
        RESPOND PREFIX="info" MSG="Retry Auto-Off, Target-Temps set"
        UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=30
      {% endif %}
    {% else %}
      {% if printer.idle_timeout.state == "Printing" %}
        RESPOND PREFIX="info" MSG="Aborting Auto-Off, printing!"
        UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=0
      {% else %}
        {% if printer.extruder.target == 0.0 and printer.heater_bed.target == 0.0 %}
          RESPOND PREFIX="info" MSG="Retry Auto-Off, Target-Temps still set"
          UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=30
        {% else %}
          RESPOND PREFIX="info" MSG="Retry Auto-Off, too warm"
          UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=30
        {% endif %}
      {% endif %}
    {% endif %}
  {% endif %}

# Power-Off Pi
[delayed_gcode POWER_OFF_PI]
gcode:
    SHOW_OFF
    {action_call_remote_method("shutdown_machine")}
initial_duration: 0.0

# Conditional G28 (home if not already homed)
[gcode_macro CG28]
gcode:
    {% if "x" not in printer.toolhead.homed_axes or "y" not in printer.toolhead.homed_axes or "z" not in printer.toolhead.homed_axes %}
    G28
    {% endif %}

# Show Status: Homed and ready to print
[gcode_macro SHOW_READY]
gcode:
    SET_LED LED=hotend_rgb RED=0 GREEN=1 BLUE=0 INDEX=1
    SET_LED LED=case_rgb RED=1 GREEN=1 BLUE=1

# Show Status: Doing prep stuff
[gcode_macro SHOW_WORKING]
gcode:
    SET_LED LED=hotend_rgb RED=1 GREEN=0.5 BLUE=0 INDEX=1
    SET_LED LED=case_rgb RED=1 GREEN=1 BLUE=1

# Show Status: Printing
[gcode_macro SHOW_PRINTING]
gcode:
    SET_LED LED=hotend_rgb RED=0 GREEN=0 BLUE=0 INDEX=1
    SET_LED LED=case_rgb RED=1 GREEN=1 BLUE=1

# Show Status: Error 
[gcode_macro SHOW_ERROR]
gcode:
    SET_LED LED=hotend_rgb RED=1 GREEN=0 BLUE=0 INDEX=1
    SET_LED LED=case_rgb RED=1 GREEN=0 BLUE=0

# Show Status: Turn OFF
[gcode_macro SHOW_OFF]
gcode:
    SET_LED LED=hotend_rgb RED=0 GREEN=0 BLUE=0 INDEX=1
    SET_LED LED=case_rgb RED=0 GREEN=0 BLUE=0

# Wipe Nozzle
[gcode_macro WIPE_NOZZLE]
gcode:
    G0 X230 Y330 Z20 F10000     ; Move to brush
    G0 X230 Y330 Z5 F10000      ; Down
    G0 X270 Y330 Z5 F10000      ; Wipe right
    G0 X230 Y330 Z5 F10000      ; Wipe left
    G0 X270 Y330 Z5 F10000      ; Wipe right
    G0 X230 Y330 Z5 F10000      ; Wipe left
    G0 X230 Y330 Z20 F10000     ; Up

# Full Homing
[gcode_macro G32]
gcode:
    M117 Homing
    SHOW_WORKING
    CG28                        ; Home if not homed to get everything turned on
    M117 QGL
    QUAD_GANTRY_LEVEL           ; Level
    M117 Re-Homing
    G28 X Y                     ; Home the X and Y
    WIPE_NOZZLE
    G28 Z                       ; Home the Z now that nozzle is clean
    G0 Z20                      ; Raise nozzle
    G0 X175 Y175 Z20 F6000      ; Return to center of bed
    M117 Ready
    SHOW_READY

[gcode_macro PRINT_START]
gcode:
    # Parameters
    {% set BED_TEMP = params.BED|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|float %}
    SAVE_GCODE_STATE NAME=start
    SHOW_WORKING

    M117 Warmup
    M190 S{BED_TEMP}                    ; set and wait for bed to reach temp
    M109 S{EXTRUDER_TEMP}               ; set and wait for hot end to reach temp

    G32                                 ; Homing and stuff

    BED_MESH_PROFILE LOAD=default

    G1 Z5 F5000                         ; move head 5mm from bed surface
    M83                                 ; Make the E relative independent of other axis
    # M117 Purging
    # PURGE_BUCKET
    # G1 E2 F1500 # unretract
    RESTORE_GCODE_STATE NAME=start
    SHOW_PRINTING
    M117 Printing


[gcode_macro PRINT_END]
gcode:
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-10.0 F3600                ; retract filament
    G91                            ; relative positioning
    G0 Z1.00 X20.0 Y20.0 F20000    ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    G1 Z2 F3000                    ; move nozzle up 2mm
    G90                            ; absolute positioning
    G0 X125 Y250 F3600             ; park nozzle at rear
    BED_MESH_CLEAR
    M117 Done!
    UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=120 ; OFF Makro with 120s delay
    SHOW_READY

[gcode_macro CANCEL_PRINT]
gcode:
    M117 Cancelled!
    TURN_OFF_HEATERS
    M106 S100       # Part Fan full speed
    M18             # Turn off motors
    SHOW_ERROR
